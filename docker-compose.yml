version: "3.8"
services:
  qopy:
    build: .
    container_name: qopy_app
    ports:
      - "127.0.0.1:3001:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://host.docker.internal:27017/qopy_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server/uploads:/app/server/uploads
