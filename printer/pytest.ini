[pytest]
# ── Pytest configuration for Qopy Printer Agent ──────────────────────────────

# Test discovery
testpaths = tests

# Async support (requires pytest-asyncio)
asyncio_mode = auto

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -rN

# Markers
markers =
    asyncio: marks async tests
    slow: marks slow tests (deselect with -m "not slow")
    integration: marks tests that require real system resources

# Minimum pytest version
minversion = 7.0
